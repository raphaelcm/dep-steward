name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Shellcheck the installer
        run: shellcheck -s sh install.sh
      - name: Run tests (gate logic, render parity, installer wiring)
        run: node --test test/*.test.mjs
